<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mi PWA - App Instalable</title>
  
  <!-- ========== FAVICONS (usando tus archivos) ========== -->
  <!-- Favicon estándar -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <!-- Apple Touch Icons (para iOS) -->
  <link rel="apple-touch-icon" sizes="152x152" href="/icono-touch-apple-152x152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/icono-touch-apple-167x167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icono-touch-apple-180x180.png">
  
  <!-- Android Chrome -->
  <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png">
  
  <!-- Safari pinned tab -->
  <link rel="mask-icon" href="/pestaña-fijada-de-safari.svg" color="#667eea">
  <!-- ========== FIN FAVICONS ========== -->
  
  <!-- Enlace al manifest.json -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- Tema de color -->
  <meta name="theme-color" content="#667eea">
  
  <!-- iOS standalone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MiApp">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 32px;
      padding: 40px 30px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    
    h1 {
      color: #333;
      margin-bottom: 16px;
      font-size: 2.2rem;
    }
    
    .icon-placeholder {
      width: 96px;
      height: 96px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 24px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    
    p {
      color: #555;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    
    .status {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      padding: 12px;
      border-radius: 8px;
      margin: 20px 0;
      font-size: 14px;
      color: #2e7d32;
    }
    
    .install-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: transform 0.2s;
    }
    
    .install-btn.hidden {
      display: none;
    }
    
    .badge {
      display: inline-block;
      background: #f0f0f0;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      margin: 5px;
      color: #666;
    }
    
    footer {
      margin-top: 24px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-placeholder">
      🚀
    </div>
    <h1>Mi Progressive Web App</h1>
    <p>
      Esta aplicación funciona <strong>sin conexión</strong> y se puede 
      <strong>instalar</strong> en tu dispositivo.
    </p>
    
    <div class="status" id="status">
      🔄 Verificando Service Worker...
    </div>
    
    <button class="install-btn hidden" id="installBtn">
      📲 Instalar aplicación
    </button>
    
    <div>
      <span class="badge">✅ Funciona offline</span>
      <span class="badge">📱 Instalable</span>
      <span class="badge">⚡ Rápida</span>
    </div>
    
    <footer>
      Versión 1.0 | Con Service Worker
    </footer>
  </div>

  <script>
    // REGISTRO DEL SERVICE WORKER
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            console.log('✅ Service Worker registrado:', registration);
            document.getElementById('status').innerHTML = '✅ App lista. Funciona sin conexión.';
            document.getElementById('status').style.background = '#e8f5e9';
          })
          .catch(error => {
            console.error('❌ Error al registrar SW:', error);
            document.getElementById('status').innerHTML = '⚠️ Error al registrar Service Worker. Asegúrate de usar HTTPS o localhost.';
            document.getElementById('status').style.background = '#ffebee';
            document.getElementById('status').style.borderLeftColor = '#f44336';
          });
      });
    } else {
      document.getElementById('status').innerHTML = '❌ Tu navegador no soporta Service Workers.';
      document.getElementById('status').style.background = '#ffebee';
    }
    
    // MANEJAR INSTALACIÓN
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
      console.log('📱 Instalación disponible');
    });
    
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`Usuario ${outcome === 'accepted' ? 'instaló' : 'canceló'} la app`);
      installBtn.classList.add('hidden');
      deferredPrompt = null;
    });
    
    window.addEventListener('appinstalled', () => {
      console.log('🎉 App instalada correctamente');
      installBtn.classList.add('hidden');
    });
    
    // INSTRUCCIONES PARA iOS
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS && !window.navigator.standalone) {
      const statusDiv = document.getElementById('status');
      statusDiv.innerHTML = '📱 En iOS: Compartir → "Agregar a pantalla de inicio"';
      statusDiv.style.background = '#fff3e0';
      statusDiv.style.borderLeftColor = '#ff9800';
    }
  </script>
</body>
</html>
