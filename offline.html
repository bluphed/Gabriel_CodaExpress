<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f8fafc;
    }
    .container {
      max-width: 400px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 { 
      color: #DE440D;
      margin-bottom: 16px;
    }
    button {
      background: #DE440D;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      margin-top: 20px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📡 Sin conexión</h1>
    <p>No tienes internet. Vuelve a intentarlo cuando tengas conexión.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
